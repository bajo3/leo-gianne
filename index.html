<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Leo &amp; Gianne · Nos casamos</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Utilidades (subset estático, sin CDN) -->
  <link rel="stylesheet" href="tw.css" />

  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    #root { min-height: 100vh; }
    #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #F7F3EB; z-index: 99; transition: opacity .6s ease; }
    #boot.hide { opacity: 0; pointer-events: none; }
    #boot .m { font-family: 'Pinyon Script', cursive; font-size: 44px; color: #B0734A; }
  </style>
</head>
<body>
  <div id="boot"><div class="m">L &amp; G</div></div>
  <div id="root"></div>

  <script>
    (function () {
      var tries = 0;
      var iv = setInterval(function () {
        var root = document.getElementById('root');
        var boot = document.getElementById('boot');
        if (root && root.children.length > 0) {
          if (boot) { boot.classList.add('hide'); boot.style.display = 'none'; }
          clearInterval(iv);
        } else if (++tries > 120) {
          clearInterval(iv);
        }
      }, 100);
    })();
  </script>

  <template id="__bundler_thumbnail" data-bg-color="#F7F3EB">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#F7F3EB"/>
      <circle cx="600" cy="400" r="150" fill="none" stroke="#B0734A" stroke-width="6"/>
      <text x="600" y="430" font-family="Georgia, serif" font-size="120" fill="#B0734A" text-anchor="middle">L&amp;G</text>
    </svg>
  </template>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections1.jsx"></script>
  <script type="text/babel" src="sections2.jsx"></script>
  <script type="text/babel" src="sections3.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
